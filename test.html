<!DOCTYPE html>
<html>
    <head>
        <title>
            Pinpoint Graph testing
        </title>
        <meta charset="utf-8">
        <style>
            body {
                font-family: 'Consolas', 'Courier New';
            }
            table {
                text-align: 'center';
            }
        </style>
    </head>
    <body>
        <h3>Editor retention on Wikimedia</h3>
        <table>
            <tr>
                <td style="width: 0%;">
                    Each square = 4 months
                </td>
                <td>
                    Current year
                </td>
            </tr>
            <tr>
                <td>
                    Year started editing
                </td>
                <td>
                    <canvas id="wm_retention" style="width: 600px; height: 300px;">

                    </canvas>
                </td>
            </tr>
        </table>
        <script src="pinpoint.js">
            
        </script>
        <script>
            function wmrp(start, curr, rate, system_mismatch) {
                pinpoint_graph.pinpoint("wm_retention", {"x": 3 * (curr - 2001), "y": 3 * (start - 2001)}, {"rg": rate, "b": system_mismatch}, 2);
            }
            wmrp(2001 + 1 / 3, 2001 + 1 / 3, 0.75, 0);
            wmrp(2001 + 1 / 3, 2001 + 2 / 3, 0.866666666667, 0);
            wmrp(2001 + 1 / 3, 2002, 0.846153846154, 0);
            wmrp(2001 + 1 / 3, 2002 + 1 / 3, 0.818181818182, 0);
            wmrp(2001 + 1 / 3, 2002 + 2 / 3, 0.888888888889, 0);
            wmrp(2001 + 1 / 3, 2003, 0.875, 0);
            wmrp(2001 + 1 / 3, 2003 + 1 / 3, 0.857142857143, 0);
            wmrp(2001 + 1 / 3, 2003 + 2 / 3, 0.9, 0);
            wmrp(2001 + 1 / 3, 2004, 0.846153846154, 0);
            wmrp(2001 + 1 / 3, 2004 + 2 / 3, 0.8, 0.001);
            wmrp(2001 + 1 / 3, 2005 + 2 / 3, 0.75, 0.004);
            wmrp(2001 + 1 / 3, 2006 + 2 / 3, 0.766666666667, 0.007);
            wmrp(2001 + 1 / 3, 2007 + 2 / 3, 0.782608695652, 0.001);
            wmrp(2001 + 1 / 3, 2008 + 2 / 3, 0.833333333333, 0.061);
            wmrp(2001 + 1 / 3, 2010 + 1 / 3, 0.733333333333, 0.153);
            wmrp(2001 + 1 / 3, 2012 + 1 / 3, 0.636363636364, 0.252);
            wmrp(2001 + 1 / 3, 2014 + 1 / 3, 0.785714285714, 0.339);
            wmrp(2001 + 1 / 3, 2016 + 1 / 3, 0.727272727273, 0.416);
            wmrp(2001 + 1 / 3, 2019 + 1 / 3, 0.625, 0.515);
            wmrp(2001 + 1 / 3, 2025 + 1 / 3, 0.965, 0.225);
            wmrp(2002 + 1 / 3, 2002 + 1 / 3, 0.97, 0.1);
            wmrp(2002 + 1 / 3, 2003, 0.94, 0.1);
            wmrp(2002 + 1 / 3, 2004, 0.97, 0.15);
            wmrp(2002 + 1 / 3, 2006 + 2 / 3, 0.98, 0.375);
            wmrp(2002 + 1 / 3, 2010, 0.98, 0.5);
            wmrp(2002 + 1 / 3, 2014 + 2 / 3, 0.98, 0.45);
            wmrp(2002 + 1 / 3, 2019 + 2 / 3, 0.985, 0.4);
            wmrp(2002 + 1 / 3, 2022 + 1 / 3, 0.986, 0.4);
            wmrp(2003 + 1 / 3, 2003 + 1 / 3, 0.935, 0.14);
            wmrp(2003 + 1 / 3, 2007, 0.96, 0.325);
            wmrp(2003 + 1 / 3, 2010 + 2 / 3, 0.9675, 0.475);
            wmrp(2005 + 1 / 3, 2005 + 1 / 3, 0.91, 0.25);
            wmrp(2005 + 1 / 3, 2009 + 1 / 3, 0.945, 0.425);
            wmrp(2005 + 1 / 3, 2013 + 1 / 3, 0.96, 0.525);
            wmrp(2005 + 1 / 3, 2025 + 1 / 3, 0.955, 0.275);
            wmrp(2009 + 1 / 3, 2025 + 1 / 3, 0.93, 0.375);
            wmrp(2010 + 1 / 3, 2010 + 1 / 3, 0.85, 0.4);
            wmrp(2010 + 1 / 3, 2014 + 1 / 3, 0.905, 0.525);
            wmrp(2010 + 1 / 3, 2017 + 2 / 3, 0.945, 0.625);
            wmrp(2013 + 1 / 3, 2013 + 1 / 3, 0.835, 0.44);
            wmrp(2013 + 1 / 3, 2017 + 1 / 3, 0.89, 0.575);
            wmrp(2013 + 1 / 3, 2021 + 1 / 3, 0.935, 0.66);
            wmrp(2013 + 1 / 3, 2025 + 1 / 3, 0.885, 0.5);
            wmrp(2017 + 1 / 3, 2025 + 1 / 3, 0.83, 0.6);
            wmrp(2021 + 1 / 3, 2025 + 1 / 3, 0.7, 0.675);
            pinpoint_graph.interpolate("wm_retention");
        </script>
    </body>
</html>
