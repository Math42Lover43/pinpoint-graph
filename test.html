<!DOCTYPE html>
<html>
    <head>
        <title>
            Pinpoint Graph testing
        </title>
        <meta charset="utf-8">
        <style>
            body {
                font-family: 'Consolas', 'Courier New';
            }
            table {
                text-align: 'center';
            }
        </style>
    </head>
    <body>
        <h3>Editor retention on Wikimedia</h3>
        <table>
            <tr>
                <td style="width: 0%;">
                    Each square = 4 months
                </td>
                <td>
                    Current year
                </td>
            </tr>
            <tr>
                <td>
                    Year started editing
                </td>
                <td>
                    <canvas id="wm_retention" style="width: 600px; height: 300px;">

                    </canvas>
                </td>
            </tr>
        </table>
        <script src="pinpoint.js">
            
        </script>
        <script>
            function wmrp(start, curr, rate, system_mismatch) {
                pinpoint_graph.pinpoint("wm_retention", {"x": 3 * (curr - 2001), "y": 3 * (start - 2001)}, {"rg": rate, "b": system_mismatch}, 2);
            }
            wmrp(2001 + 1 / 3, 2001 + 1 / 3, 0.935, 0);
            wmrp(2001 + 1 / 3, 2001 + 2 / 3, 0.945, 0);
            wmrp(2001 + 1 / 3, 2002, 0.955, 0);
            wmrp(2001 + 1 / 3, 2003 + 2 / 3, 0.965, 0);
            wmrp(2001 + 1 / 3, 2007, 0.955, 0);
            wmrp(2001 + 1 / 3, 2011, 0.945, 0);
            wmrp(2001 + 1 / 3, 2017, 0.935, 0);
            wmrp(2001 + 1 / 3, 2023, 0.92, 0);
            pinpoint_graph.interpolate("wm_retention");
        </script>
    </body>
</html>
