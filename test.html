<!DOCTYPE html>
<html>
    <head>
        <title>
            Pinpoint Graph testing
        </title>
        <meta charset="utf-8">
        <style>
            body {
                font-family: 'Consolas', 'Courier New';
            }
            table {
                text-align: 'center';
            }
        </style>
    </head>
    <body>
        <h3>Editor retention on Wikimedia</h3>
        <table>
            <tr>
                <td style="width: 0%;">
                    Each square = 4 months
                </td>
                <td>
                    Current year
                </td>
            </tr>
            <tr>
                <td>
                    Year started editing
                </td>
                <td>
                    <canvas id="wm_retention" style="width: 100%; height: 100%;">

                    </canvas>
                </td>
            </tr>
        </table>
        <script src="pinpoint.js">
            
        </script>
        <script>
            function wmrp(start, curr, rate, system_mismatch) {
                pinpoint_graph.pinpoint("wm_retention", {"x": 3 * (curr - 2001), "y": 3 * (start - 2001)}, {"rg": rate, "b": system_mismatch}, 3);
            }
            wmrp(2001 + 1 / 3, 2001 + 1 / 3, 0.75, 0);
            wmrp(2001 + 1 / 3, 2001 + 2 / 3, 0.866666666667, 0);
            wmrp(2001 + 1 / 3, 2002, 0.846153846154, 0);
            wmrp(2001 + 1 / 3, 2002 + 1 / 3, 0.818181818182, 0);
            wmrp(2001 + 1 / 3, 2002 + 2 / 3, 0.888888888889, 0);
            wmrp(2001 + 1 / 3, 2003, 0.875, 0);
            wmrp(2001 + 1 / 3, 2003 + 1 / 3, 0.857142857143, 0);
            wmrp(2001 + 1 / 3, 2003 + 2 / 3, 0.9, 0);
            wmrp(2001 + 1 / 3, 2004, 0.846153846154, 0);
            wmrp(2001 + 1 / 3, 2004 + 2 / 3, 0.8, 0);
            wmrp(2001 + 1 / 3, 2005 + 2 / 3, 0.75, 0);
            wmrp(2001 + 1 / 3, 2006 + 2 / 3, 0.766666666667, 0);
            wmrp(2001 + 1 / 3, 2007 + 2 / 3, 0.782608695652, 0);
            wmrp(2001 + 1 / 3, 2008 + 2 / 3, 0.833333333333, 0);
            wmrp(2001 + 1 / 3, 2010 + 1 / 3, 0.733333333333, 0);
            wmrp(2001 + 1 / 3, 2012 + 1 / 3, 0.636363636364, 0);
            wmrp(2001 + 1 / 3, 2014 + 1 / 3, 0.785714285714, 0);
            wmrp(2001 + 1 / 3, 2016 + 1 / 3, 0.727272727273, 0);
            wmrp(2001 + 1 / 3, 2019 + 1 / 3, 0.625, 0);
            pinpoint_graph.interpolate(wm_retention);
        </script>
    </body>
</html>
