        <script>
            function wmrp(start, curr, rate, system_mismatch) {
                pinpoint_graph.pinpoint("wm_retention", {"x": 3 * (curr - 2001), "y": 3 * (start - 2001)}, {"rg": rate, "b": system_mismatch}, 2);
            }
            document.getElementById("wm_retention").getContext("2d").lineWidth = 1;
            document.getElementById("wm_retention").getContext("2d").strokeStyle = "rgb(223, 223, 223)";
            for(let k = 2001; k <= 2026; k += 3) {
                document.getElementById("wm_retention").getContext("2d").beginPath();
                document.getElementById("wm_retention").getContext("2d").moveTo(6 * (k - 2001) + 0.5, 0.5);
                document.getElementById("wm_retention").getContext("2d").lineTo(6 * (k - 2001) + 0.5, 144.5);
                document.getElementById("wm_retention").getContext("2d").stroke();
                document.getElementById("wm_retention").getContext("2d").beginPath();
                document.getElementById("wm_retention").getContext("2d").moveTo(0.5, 6 * (k - 2001) + 0.5);
                document.getElementById("wm_retention").getContext("2d").lineTo(144.5, 6 * (k - 2001) + 0.5);
                document.getElementById("wm_retention").getContext("2d").stroke();
            }
