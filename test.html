<!DOCTYPE html>
<html>
    <head>
        <title>
            Pinpoint Graph testing
        </title>
        <meta charset="utf-8">
        <style>
            body {
                font-family: 'Consolas', 'Courier New';
            }
            table {
                text-align: 'center';
            }
        </style>
    </head>
    <body>
        <h3>Editor retention on Wikimedia</h3>
        <table>
            <tr>
                <td style="width: 0%;">
                    Each square = 4 months
                </td>
                <td>
                    Current year
                </td>
            </tr>
            <tr>
                <td>
                    Year started editing
                </td>
                <td>
                    <canvas id="wm_retention" style="width: 600px; height: 300px;">

                    </canvas>
                </td>
            </tr>
        </table>
        <script src="pinpoint.js">
            
        </script>
        <script>
            function wmrp(start, curr, rate, system_mismatch) {
                pinpoint_graph.pinpoint("wm_retention", {"x": 3 * (curr - 2001), "y": 3 * (start - 2001)}, {"rg": rate, "b": system_mismatch}, 2);
            }
            wmrp(2001 + 1 / 3, 2001 + 1 / 3, 0.935, 0.25);
            wmrp(2001 + 1 / 3, 2001 + 2 / 3, 0.945, 0.25);
            wmrp(2001 + 1 / 3, 2002, 0.955, 0.25);
            wmrp(2001 + 1 / 3, 2003 + 2 / 3, 0.965, 0.3);
            wmrp(2001 + 1 / 3, 2007, 0.955, 0.35);
            wmrp(2001 + 1 / 3, 2011, 0.945, 0.4);
            wmrp(2001 + 1 / 3, 2017 + 1 / 3, 0.935, 0.475);
            wmrp(2001 + 1 / 3, 2022 + 1 / 3, 0.92, 0.575);
            wmrp(2001 + 1 / 3, 2025 + 1 / 3, 0.83, 0.725);
            wmrp(2005 + 1 / 3, 2005 + 1 / 3, 0.815, 0.4);
            wmrp(2005 + 1 / 3, 2005 + 2 / 3, 0.83, 0.4);
            wmrp(2005 + 1 / 3, 2006, 0.85, 0.4);
            wmrp(2005 + 1 / 3, 2007 + 2 / 3, 0.9, 0.45);
            wmrp(2005 + 1 / 3, 2011, 0.93, 0.5);
            wmrp(2005 + 1 / 3, 2015, 0.94, 0.55);
            wmrp(2005 + 1 / 3, 2018 + 1 / 3, 0.935, 0.6);
            wmrp(2005 + 1 / 3, 2022 + 1 / 3, 0.92, 0.675);
            wmrp(2005 + 1 / 3, 2025 + 1 / 3, 0.81, 0.775);
            wmrp(2009 + 1 / 3, 2009 + 1 / 3, 0.785, 0.45);
            wmrp(2009 + 1 / 3, 2009 + 2 / 3, 0.815, 0.45);
            wmrp(2009 + 1 / 3, 2010, 0.85, 0.45);
            wmrp(2009 + 1 / 3, 2011 + 2 / 3, 0.91, 0.5);
            wmrp(2009 + 1 / 3, 2015, 0.93, 0.55);
            wmrp(2009 + 1 / 3, 2018 + 1 / 3, 0.93, 0.625);
            wmrp(2009 + 1 / 3, 2022 + 1 / 3, 0.92, 0.7);
            wmrp(2009 + 1 / 3, 2025 + 1 / 3, 0.79, 0.815);
            wmrp(2013 + 1 / 3, 2013 + 1 / 3, 0.76, 0.5);
            wmrp(2013 + 1 / 3, 2013 + 2 / 3, 0.785, 0.5);
            wmrp(2013 + 1 / 3, 2014, 0.83, 0.5);
            wmrp(2013 + 1 / 3, 2015 + 2 / 3, 0.9, 0.55);
            wmrp(2013 + 1 / 3, 2018 + 2 / 3, 0.94, 0.6);
            wmrp(2013 + 1 / 3, 2022 + 1 / 3, 0.94, 0.675);
            wmrp(2013 + 1 / 3, 2025 + 1 / 3, 0.77, 0.815);
            wmrp(2017 + 1 / 3, 2017 + 1 / 3, 0.785, 0.475);
            wmrp(2017 + 1 / 3, 2017 + 2 / 3, 0.81, 0.475);
            wmrp(2017 + 1 / 3, 2018, 0.85, 0.475);
            wmrp(2017 + 1 / 3, 2019 + 2 / 3, 0.92, 0.525);
            wmrp(2017 + 1 / 3, 2023, 0.92, 0.625);
            wmrp(2017 + 1 / 3, 2024 + 1 / 3, 0.92, 0.675);
            wmrp(2017 + 1 / 3, 2025 + 1 / 3, 0.74, 0.86);
            wmrp(2021 + 1 / 3, 2021 + 1 / 3, 0.74, 0.525);
            wmrp(2021 + 1 / 3, 2021 + 2 / 3, 0.785, 0.525);
            wmrp(2021 + 1 / 3, 2022, 0.83, 0.525);
            wmrp(2021 + 1 / 3, 2023 + 1 / 3, 0.9, 0.625);
            wmrp(2021 + 1 / 3, 2025 + 1 / 3, 0.7, 0.9);
            pinpoint_graph.interpolate("wm_retention");
        </script>
    </body>
</html>
